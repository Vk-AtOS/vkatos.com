<style>
:root {
  --navy: #080F1E;
  --navy2: #0D1829;
  --blue: #1B4FD8;
  --accent: #00C2D4;
  --accent2: #00E5F5;
  --green: #00D68F;
  --white: #F0F4FF;
  --muted: #4A5878;
  --border: rgba(255,255,255,0.07);
  --card: rgba(255,255,255,0.03);
  --card-hover: rgba(255,255,255,0.06);
  --font-display: 'Syne', sans-serif;
  --font-body: 'DM Sans', sans-serif;
  --font-mono: 'DM Mono', monospace;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: var(--navy);
  color: var(--white);
  font-family: var(--font-body);
  font-weight: 300;
  line-height: 1.7;
  overflow-x: hidden;
  cursor: none;
}

/* ── CUSTOM CURSOR ── */
.cursor {
  width: 10px; height: 10px;
  background: var(--accent);
  border-radius: 50%;
  position: fixed; top: 0; left: 0;
  pointer-events: none;
  z-index: 9999;
  transition: transform 0.15s ease;
  mix-blend-mode: screen;
}
.cursor-ring {
  width: 36px; height: 36px;
  border: 1px solid rgba(0,194,212,0.4);
  border-radius: 50%;
  position: fixed; top: 0; left: 0;
  pointer-events: none;
  z-index: 9998;
  transition: transform 0.08s ease, width 0.2s, height 0.2s, opacity 0.2s;
}
a, button { cursor: none; }

/* ── NAV ── */
nav {
  position: fixed; top: 0; left: 0; right: 0;
  z-index: 100;
  padding: 1.25rem 4rem;
  display: flex; align-items: center; justify-content: space-between;
  background: rgba(8,15,30,0.85);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
}
.nav-logo {
  font-family: var(--font-display);
  font-size: 1.4rem;
  font-weight: 800;
  color: var(--white);
  text-decoration: none;
}
.nav-logo span { color: var(--accent); }
.nav-links { display: flex; gap: 2rem; list-style: none; align-items: center; }
.nav-links a {
  font-family: var(--font-body);
  font-size: 0.85rem;
  font-weight: 400;
  color: rgba(240,244,255,0.55);
  text-decoration: none;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  transition: color 0.2s;
}
.nav-links a:hover { color: var(--white); }

.hamburger {
  display: none;
  flex-direction: column;
  gap: 5px;
  cursor: pointer;
  z-index: 101;
}
.hamburger span {
  display: block;
  width: 25px;
  height: 2px;
  background: var(--white);
  transition: 0.3s;
}

.nav-right { display: flex; align-items: center; gap: 1.5rem; }
.btn-login {
  font-family: var(--font-body);
  font-size: 0.85rem;
  color: rgba(240,244,255,0.55);
  text-decoration: none;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}
.btn-login:hover { color: var(--white); }
.btn-demo {
  background: var(--accent);
  color: var(--navy);
  padding: 0.5rem 1.25rem;
  border-radius: 2px;
  font-weight: 700;
  font-size: 0.8rem;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  text-decoration: none;
  transition: background 0.2s;
}
.btn-demo:hover { background: var(--accent2); }

/* ── PRODUCT HERO ── */
.product-hero {
  padding: 10rem 4rem 4rem;
  text-align: center;
  position: relative;
}
.hero-badge-row { display: flex; justify-content: center; gap: 1rem; margin-bottom: 2rem; flex-wrap: wrap; }
.badge {
  background: rgba(0,194,212,0.08);
  border: 1px solid rgba(0,194,212,0.2);
  padding: 0.35rem 0.9rem;
  border-radius: 2px;
  font-family: var(--font-mono);
  font-size: 0.72rem;
  color: var(--accent);
  letter-spacing: 0.1em;
}
h1 { font-family: var(--font-display); font-size: clamp(2.5rem, 5vw, 4rem); font-weight: 800; margin-bottom: 1rem; }
.hero-sub { font-size: 1.15rem; color: var(--muted); max-width: 600px; margin: 0 auto 3rem; }

/* ── FEATURES ── */
.features-section { padding: 6rem 4rem; }
.features-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 2rem;
  max-width: 1200px;
  margin: 0 auto;
}
.feature-card {
  background: var(--card);
  border: 1px solid var(--border);
  padding: 3rem;
  border-radius: 4px;
}
.feature-card h3 { font-family: var(--font-display); font-size: 1.25rem; margin-bottom: 1rem; }
.feature-card p { font-size: 0.9rem; color: var(--muted); }

/* ── LIST ── */
.key-features { padding: 8rem 4rem; background: var(--navy2); }
.features-list-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 4rem;
  max-width: 1000px;
  margin: 4rem auto 0;
}
.feature-item { display: flex; gap: 1.5rem; }
.feature-icon { font-size: 1.5rem; color: var(--accent); }
.feature-item h4 { font-family: var(--font-display); font-size: 1.2rem; margin-bottom: 0.5rem; }
.feature-item p { font-size: 0.9rem; color: var(--muted); }

/* ── FOOTER ── */
footer {
  border-top: 1px solid var(--border);
  padding: 5rem 4rem 2rem;
  background: var(--navy);
}
.footer-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 4rem;
  margin-bottom: 4rem;
}
.footer-logo {
  font-family: var(--font-display);
  font-size: 1.4rem;
  font-weight: 800;
  color: var(--white);
  text-decoration: none;
  margin-bottom: 1rem;
  display: block;
}
.footer-logo span { color: var(--accent); }
.footer-col h4 {
  font-family: var(--font-mono);
  font-size: 0.72rem;
  color: var(--white);
  letter-spacing: 0.15em;
  text-transform: uppercase;
  margin-bottom: 1.5rem;
}
.footer-col ul { list-style: none; }
.footer-col ul li { margin-bottom: 0.75rem; }
.footer-col ul li a {
  font-size: 0.85rem;
  color: var(--muted);
  text-decoration: none;
  transition: color 0.2s;
}
.footer-col ul li a:hover { color: var(--accent); }
.footer-bottom {
  border-top: 1px solid var(--border);
  padding-top: 2rem;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.footer-copy { font-size: 0.78rem; color: var(--muted); }

/* ── ANIMATIONS ── */
.reveal {
  opacity: 0; transform: translateY(24px);
  transition: opacity 0.7s ease, transform 0.7s ease;
}
.reveal.visible { opacity: 1; transform: translateY(0); }

@media (max-width: 1024px) {
  .features-grid, .features-list-grid { grid-template-columns: 1fr; }
  .footer-grid { grid-template-columns: 1fr 1fr; }
}
@media (max-width: 768px) {
  nav { padding: 1rem 20px; }
  .hamburger { display: flex; }
  .nav-links {
    position: fixed;
    top: 0; right: -100%;
    width: 100%; height: 100vh;
    background: var(--navy);
    flex-direction: column;
    justify-content: center;
    align-items: center;
    transition: 0.4s;
    z-index: 100;
    gap: 2rem;
  }
  .nav-links.active { right: 0; }
  .nav-right { display: none; }
  
  .product-hero, .features-section, .key-features, footer { padding: 4rem 20px; }
  .product-hero h1 { font-size: 2.5rem; }
  
  .footer-grid { grid-template-columns: 1fr; gap: 2rem; }
  .footer-bottom { flex-direction: column; gap: 1rem; text-align: center; }
}

<script>
// Custom cursor
const cursor = document.getElementById('cursor');
const ring = document.getElementById('cursorRing');
let mx = 0, my = 0, rx = 0, ry = 0;
document.addEventListener('mousemove', e => {
  mx = e.clientX; my = e.clientY;
  cursor.style.transform = `translate(${mx-5}px, ${my-5}px)`;
});
function animateRing() {
  rx += (mx - rx) * 0.12;
  ry += (my - ry) * 0.12;
  ring.style.transform = `translate(${rx-18}px, ${ry-18}px)`;
  requestAnimationFrame(animateRing);
}
animateRing();
document.querySelectorAll('a, button').forEach(el => {
  el.addEventListener('mouseenter', () => {
    cursor.style.transform += ' scale(1.8)';
    ring.style.width = '50px'; ring.style.height = '50px';
    ring.style.borderColor = 'rgba(0,194,212,0.6)';
  });
  el.addEventListener('mouseleave', () => {
    ring.style.width = '36px'; ring.style.height = '36px';
    ring.style.borderColor = 'rgba(0,194,212,0.4)';
  });
});

// Scroll reveal
const reveals = document.querySelectorAll('.reveal');
const observer = new IntersectionObserver(entries => {
  entries.forEach((entry, i) => {
    if (entry.isIntersecting) {
      setTimeout(() => entry.target.classList.add('visible'), i * 80);
    }
  });
}, { threshold: 0.1 });
reveals.forEach(el => observer.observe(el));
</script>
