<style>
:root {
  --navy: #080F1E;
  --navy2: #0D1829;
  --blue: #1B4FD8;
  --accent: #00C2D4;
  --accent2: #00E5F5;
  --green: #00D68F;
  --white: #F0F4FF;
  --muted: #4A5878;
  --border: rgba(255,255,255,0.07);
  --card: rgba(255,255,255,0.03);
  --card-hover: rgba(255,255,255,0.06);
  --font-display: 'Syne', sans-serif;
  --font-body: 'DM Sans', sans-serif;
  --font-mono: 'DM Mono', monospace;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: var(--navy);
  color: var(--white);
  font-family: var(--font-body);
  font-weight: 300;
  line-height: 1.7;
  overflow-x: hidden;
  cursor: none;
}

/* ── CUSTOM CURSOR ── */
.cursor {
  width: 10px; height: 10px;
  background: var(--accent);
  border-radius: 50%;
  position: fixed; top: 0; left: 0;
  pointer-events: none;
  z-index: 9999;
  transition: transform 0.15s ease;
  mix-blend-mode: screen;
}
.cursor-ring {
  width: 36px; height: 36px;
  border: 1px solid rgba(0,194,212,0.4);
  border-radius: 50%;
  position: fixed; top: 0; left: 0;
  pointer-events: none;
  z-index: 9998;
  transition: transform 0.08s ease, width 0.2s, height 0.2s, opacity 0.2s;
}
a, button { cursor: none; }

/* ── NAV ── */
nav {
  position: fixed; top: 0; left: 0; right: 0;
  z-index: 100;
  padding: 1.25rem 4rem;
  display: flex; align-items: center; justify-content: space-between;
  background: rgba(8,15,30,0.85);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
}
.nav-logo {
  font-family: var(--font-display);
  font-size: 1.4rem;
  font-weight: 800;
  color: var(--white);
  text-decoration: none;
}
.nav-logo span { color: var(--accent); }
.nav-links { display: flex; gap: 2rem; list-style: none; align-items: center; }
.nav-links a {
  font-family: var(--font-body);
  font-size: 0.85rem;
  font-weight: 400;
  color: rgba(240,244,255,0.55);
  text-decoration: none;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  transition: color 0.2s;
}
.nav-links a:hover { color: var(--white); }

.hamburger {
  display: none;
  flex-direction: column;
  gap: 5px;
  cursor: pointer;
  z-index: 101;
}
.hamburger span {
  display: block;
  width: 25px;
  height: 2px;
  background: var(--white);
  transition: 0.3s;
}

.nav-right { display: flex; align-items: center; gap: 1.5rem; }
.btn-login {
  font-family: var(--font-body);
  font-size: 0.85rem;
  color: rgba(240,244,255,0.55);
  text-decoration: none;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}
.btn-login:hover { color: var(--white); }
.btn-demo {
  background: var(--accent);
  color: var(--navy);
  padding: 0.5rem 1.25rem;
  border-radius: 2px;
  font-weight: 700;
  font-size: 0.8rem;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  text-decoration: none;
  transition: background 0.2s;
}
.btn-demo:hover { background: var(--accent2); }

/* ── HERO ── */
.about-hero {
  padding: 12rem 4rem 8rem;
  position: relative;
  overflow: hidden;
}
.hero-grid {
  position: absolute; inset: 0;
  background-image:
    linear-gradient(rgba(0,194,212,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,194,212,0.04) 1px, transparent 1px);
  background-size: 80px 80px;
  mask-image: radial-gradient(circle at 0% 0%, black 30%, transparent 100%);
  pointer-events: none;
}
.about-hero h1 {
  font-family: var(--font-display);
  font-size: clamp(2.5rem, 6vw, 4.5rem);
  font-weight: 800;
  line-height: 1.1;
  max-width: 900px;
  letter-spacing: -0.03em;
}

/* ── MISSION ── */
.mission-section {
  padding: 8rem 4rem;
  background: var(--navy2);
}
.mission-container {
  max-width: 800px;
  margin: 0 auto;
}
.section-label {

  font-size: 0.75rem;
  color: var(--accent);

.mission-text {

  line-height: 1.5;
  color: var(--white);
}
.mission-text span { color: var(--muted); }

/* ── FOUNDER ── */
.founder-section {
  padding: 8rem 4rem;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6rem;
  align-items: center;
  max-width: 1200px;
  margin: 0 auto;
}
.founder-image {
  aspect-ratio: 1;
  background: linear-gradient(135deg, var(--card), var(--navy2));
  border: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-display);
  font-size: 5rem;
  font-weight: 800;
  color: var(--accent);
  position: relative;
}
.founder-image::after {
  content: '';
  position: absolute;
  inset: -10px;
  border: 1px solid rgba(0,194,212,0.2);
  z-index: -1;
}
.founder-image .glow {
  position: absolute;
  width: 100%; height: 100%;
  background: radial-gradient(circle, rgba(0,194,212,0.1) 0%, transparent 70%);

.founder-info h2 { font-family: var(--font-display); font-size: 2.5rem; margin-bottom: 0.5rem; }
.founder-title { font-family: var(--font-mono); color: var(--accent); margin-bottom: 2rem; }
.founder-bio { color: rgba(240,244,255,0.6); font-size: 1rem; }

/* ── PHILOSOPHY ── */
.philosophy-section { padding: 8rem 4rem; }
.philosophy-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 2rem;
  margin-top: 4rem;
}
.philosophy-card {
  background: var(--card);
  border: 1px solid var(--border);
  padding: 3rem;
  border-radius: 4px;
}
.philosophy-num { font-family: var(--font-mono); color: var(--accent); margin-bottom: 1.5rem; display: block; }
.philosophy-card h3 { font-family: var(--font-display); font-size: 1.25rem; margin-bottom: 1rem; }
.philosophy-card p { font-size: 0.9rem; color: var(--muted); }

/* ── TIMELINE ── */
.timeline-section { padding: 8rem 4rem; background: var(--navy2); }
.timeline-container { max-width: 800px; margin: 0 auto; position: relative; }
.timeline-container::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 1px;
  background: var(--border);
}
.timeline-item {
  padding-left: 3rem;
  margin-bottom: 4rem;
  position: relative;
}
.timeline-item::before {
  content: '';
  position: absolute;
  left: -4px; top: 0;
  width: 9px; height: 9px;
  background: var(--accent);
  border-radius: 50%;

.timeline-date { font-family: var(--font-mono); font-size: 0.8rem; color: var(--muted); margin-bottom: 0.5rem; display: block; }
.timeline-item h4 { font-family: var(--font-display); font-size: 1.25rem; margin-bottom: 0.5rem; }
.timeline-item p { font-size: 0.9rem; color: rgba(240,244,255,0.5); }

/* ── VALUES ── */

.values-row {

  justify-content: center;
  gap: 4rem;
  margin-top: 3rem;

}
.value-item { font-family: var(--font-display); font-size: 2rem; font-weight: 700; color: var(--white); }
.value-item span { color: var(--accent); }

/* ── FOOTER ── */
footer {

  padding: 5rem 4rem 2rem;

.footer-grid {

  letter-spacing: 0.15em;
  text-transform: uppercase;
  margin-bottom: 1.5rem;

.footer-col ul { list-style: none; }
.footer-col ul li { margin-bottom: 0.75rem; }
.footer-col ul li a {

  color: var(--muted);
  text-decoration: none;
  transition: color 0.2s;

.footer-col ul li a:hover { color: var(--accent); }
.footer-bottom {

  padding-top: 2rem;

  justify-content: space-between;

}
.footer-copy { font-size: 0.78rem; color: var(--muted); }

/* ── ANIMATIONS ── */
.reveal {
  opacity: 0; transform: translateY(24px);
  transition: opacity 0.7s ease, transform 0.7s ease;
}
.reveal.visible { opacity: 1; transform: translateY(0); }

@media (max-width: 1024px) {

}

<script>
// Custom cursor
const cursor = document.getElementById('cursor');
const ring = document.getElementById('cursorRing');
let mx = 0, my = 0, rx = 0, ry = 0;
document.addEventListener('mousemove', e => {
  mx = e.clientX; my = e.clientY;
  cursor.style.transform = `translate(${mx-5}px, ${my-5}px)`;
});
function animateRing() {
  rx += (mx - rx) * 0.12;
  ry += (my - ry) * 0.12;
  ring.style.transform = `translate(${rx-18}px, ${ry-18}px)`;
  requestAnimationFrame(animateRing);
}
animateRing();
document.querySelectorAll('a, button').forEach(el => {
  el.addEventListener('mouseenter', () => {
    cursor.style.transform += ' scale(1.8)';
    ring.style.width = '50px'; ring.style.height = '50px';
    ring.style.borderColor = 'rgba(0,194,212,0.6)';
  });
  el.addEventListener('mouseleave', () => {
    ring.style.width = '36px'; ring.style.height = '36px';
    ring.style.borderColor = 'rgba(0,194,212,0.4)';
  });
});

// Scroll reveal
const reveals = document.querySelectorAll('.reveal');
const observer = new IntersectionObserver(entries => {
  entries.forEach((entry, i) => {
    if (entry.isIntersecting) {
      setTimeout(() => entry.target.classList.add('visible'), i * 80);
    }
  });
}, { threshold: 0.1 });
reveals.forEach(el => observer.observe(el));
</script>
