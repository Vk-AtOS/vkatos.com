<!DOCTYPE html>
<html lang='en'>
<head>
  <meta charset='UTF-8'>
  <title>See VKatOS in 10 minutes</title>
  <style>
    body { background: #04080F; color: #F1F5F9; font-family: system-ui; padding: 40px; }
    .container { max-width: 900px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1fr; gap: 40px; }
    h1 { color: #00C2D4; }
    .form-group { margin-bottom: 20px; }
    label { display: block; margin-bottom: 8px; color: #94A3B8; }
    input, select { width: 100%; padding: 12px; background: #0A1628; border: 1px solid #1E2D40; color: white; border-radius: 8px; box-sizing: border-box;}
    button { width: 100%; padding: 14px; background: #00C2D4; color: #04080F; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; }
  </style>
</head>
<body>
  <div class='container'>
    <div>
      <h1>See VKatOS in 10 minutes</h1>
      <p>No slides. No sales pitch. A live demo of your pipeline.</p>
      <ul>
        <li>Your morning briefing</li>
        <li>Case advancing demo</li>
        <li>GAIA auto-chasing</li>
        <li>WhatsApp updates</li>
      </ul>
    </div>
    <div>
      <form id='demoForm'>
        <div class='form-group'><label>Name</label><input type='text' id='name' required></div>
        <div class='form-group'><label>Company</label><input type='text' id='company' required></div>
        <div class='form-group'><label>WhatsApp Number</label><input type='text' id='phone' required pattern='[0-9]{10}'></div>
        <div class='form-group'><label>Industry</label>
          <select id='industry'><option>Education Consultancy</option><option>Education Finance</option><option>Other</option></select>
        </div>
        <button type='submit'>Request Demo</button>
      </form>
    </div>
  </div>
  <script>
    document.getElementById('demoForm').onsubmit = (e) => {
      e.preventDefault();
      const name = document.getElementById('name').value;
      const company = document.getElementById('company').value;
      const phone = document.getElementById('phone').value;
      const url = 'https://wa.me/918056238628?text=' + encodeURIComponent('Hi Velan, I want to book a VKatOS demo. Name: ' + name + ', Company: ' + company + ', WhatsApp: ' + phone);
      window.open(url, '_blank');
      alert('Thank you! Opening WhatsApp to connect with Velan.');
    };
  </script>
</body>
</html>
