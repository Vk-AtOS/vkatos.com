<style>
:root {
  --navy: #080F1E;
  --navy2: #0D1829;
  --blue: #1B4FD8;
  --accent: #00C2D4;
  --accent2: #00E5F5;
  --green: #00D68F;
  --white: #F0F4FF;
  --muted: #4A5878;
  --border: rgba(255,255,255,0.07);
  --card: rgba(255,255,255,0.03);
  --card-hover: rgba(255,255,255,0.06);
  --font-display: 'Syne', sans-serif;
  --font-body: 'DM Sans', sans-serif;
  --font-mono: 'DM Mono', monospace;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: var(--navy);
  color: var(--white);
  font-family: var(--font-body);
  font-weight: 300;
  line-height: 1.7;
  overflow-x: hidden;
  cursor: none;
}

/* ── CUSTOM CURSOR ── */
.cursor {
  width: 10px; height: 10px;
  background: var(--accent);
  border-radius: 50%;
  position: fixed; top: 0; left: 0;
  pointer-events: none;
  z-index: 9999;
  transition: transform 0.15s ease;
  mix-blend-mode: screen;
}
.cursor-ring {
  width: 36px; height: 36px;
  border: 1px solid rgba(0,194,212,0.4);
  border-radius: 50%;
  position: fixed; top: 0; left: 0;
  pointer-events: none;
  z-index: 9998;
  transition: transform 0.08s ease, width 0.2s, height 0.2s, opacity 0.2s;
}
a, button { cursor: none; }

/* ── NAV ── */
nav {
  position: fixed; top: 0; left: 0; right: 0;
  z-index: 100;
  padding: 1.25rem 4rem;
  display: flex; align-items: center; justify-content: space-between;
  background: rgba(8,15,30,0.85);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
}
.nav-logo {
  font-family: var(--font-display);
  font-size: 1.4rem;
  font-weight: 800;
  color: var(--white);
  text-decoration: none;
}
.nav-logo span { color: var(--accent); }
.nav-links { display: flex; gap: 2rem; list-style: none; align-items: center; }
.nav-links a {
  font-family: var(--font-body);
  font-size: 0.85rem;
  font-weight: 400;
  color: rgba(240,244,255,0.55);
  text-decoration: none;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  transition: color 0.2s;
}
.nav-links a:hover { color: var(--white); }

.hamburger {
  display: none;
  flex-direction: column;
  gap: 5px;
  cursor: pointer;
  z-index: 101;
}
.hamburger span {
  display: block;
  width: 25px;
  height: 2px;
  background: var(--white);
  transition: 0.3s;
}

.nav-right { display: flex; align-items: center; gap: 1.5rem; }
.btn-login {
  font-family: var(--font-body);
  font-size: 0.85rem;
  color: rgba(240,244,255,0.55);
  text-decoration: none;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}
.btn-login:hover { color: var(--white); }
.btn-demo {
  background: var(--accent);
  color: var(--navy);
  padding: 0.5rem 1.25rem;
  border-radius: 2px;
  font-weight: 700;
  font-size: 0.8rem;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  text-decoration: none;
  transition: background 0.2s;
}
.btn-demo:hover { background: var(--accent2); }

/* ── PRICING HERO ── */
.pricing-hero {
  padding: 10rem 4rem 4rem;
  text-align: center;
  position: relative;
}
.hero-grid {
  position: absolute; inset: 0;
  background-image:
    linear-gradient(rgba(0,194,212,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,194,212,0.04) 1px, transparent 1px);
  background-size: 60px 60px;
  mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 40%, transparent 100%);
  pointer-events: none;
}
h1 {
  font-family: var(--font-display);
  font-size: clamp(2.5rem, 5vw, 4rem);
  font-weight: 800;
  margin-bottom: 1rem;
  letter-spacing: -0.02em;
}
.hero-sub {
  font-size: 1.15rem;
  color: rgba(240,244,255,0.55);
  max-width: 600px;
  margin: 0 auto 3rem;
}

/* ── TOGGLE ── */
.toggle-container {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 1rem;
  margin-bottom: 4rem;
  position: relative;
  z-index: 2;
}
.toggle-label {
  font-family: var(--font-mono);
  font-size: 0.8rem;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.1em;
}
.toggle-label.active { color: var(--accent); }
.switch {
  position: relative;
  display: inline-block;
  width: 50px;
  height: 24px;
}
.switch input { opacity: 0; width: 0; height: 0; }
.slider {
  position: absolute;
  cursor: pointer;
  top: 0; left: 0; right: 0; bottom: 0;
  background-color: var(--card);
  border: 1px solid var(--border);
  transition: .4s;
  border-radius: 24px;
}
.slider:before {
  position: absolute;
  content: "";
  height: 16px; width: 16px;
  left: 3px; bottom: 3px;
  background-color: var(--accent);
  transition: .4s;
  border-radius: 50%;
}
input:checked + .slider:before { transform: translateX(26px); }
.discount-badge {
  background: rgba(0,214,143,0.1);
  color: var(--green);
  font-family: var(--font-mono);
  font-size: 0.7rem;
  padding: 0.2rem 0.5rem;
  border-radius: 2px;
  margin-left: 0.5rem;
}

/* ── CARDS ── */
.pricing-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 2rem;
  max-width: 1200px;
  margin: 0 auto 6rem;
  padding: 0 2rem;
}
.price-card {
  background: var(--card);
  border: 1px solid var(--border);
  padding: 3rem 2.5rem;
  border-radius: 4px;
  display: flex;
  flex-direction: column;
  position: relative;
  transition: all 0.3s;
}
.price-card.popular {
  border-color: var(--accent);
  background: rgba(0,194,212,0.02);
  transform: scale(1.05);
  z-index: 2;
}
.popular-badge {
  position: absolute;
  top: 0; left: 50%;
  transform: translate(-50%, -50%);
  background: var(--accent);
  color: var(--navy);
  font-family: var(--font-mono);
  font-size: 0.7rem;
  font-weight: 700;
  padding: 0.3rem 0.8rem;
  border-radius: 2px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
}
.tier-name {
  font-family: var(--font-mono);
  font-size: 0.8rem;
  color: var(--accent);
  text-transform: uppercase;
  letter-spacing: 0.2em;
  margin-bottom: 1.5rem;
}
.price-value {
  font-family: var(--font-display);
  font-size: 2.5rem;
  font-weight: 800;
  margin-bottom: 0.5rem;
}
.price-value span { font-size: 1rem; color: var(--muted); font-weight: 400; }
.tier-desc {
  font-size: 0.9rem;
  color: var(--muted);
  margin-bottom: 2.5rem;
  min-height: 3rem;
}
.feature-list {
  list-style: none;
  margin-bottom: 3rem;
  flex-grow: 1;
}
.feature-list li {
  font-size: 0.9rem;
  color: rgba(240,244,255,0.7);
  margin-bottom: 1rem;
  display: flex;
  gap: 0.8rem;
}
.feature-list li::before { content: "✓"; color: var(--accent); font-weight: 800; }
.btn-tier {
  display: block;
  text-align: center;
  padding: 1rem;
  font-family: var(--font-display);
  font-weight: 700;
  text-decoration: none;
  border-radius: 2px;
  transition: all 0.2s;
}
.btn-starter, .btn-enterprise { border: 1px solid var(--border); color: var(--white); }
.btn-starter:hover, .btn-enterprise:hover { background: var(--card-hover); border-color: rgba(255,255,255,0.2); }
.btn-popular { background: var(--accent); color: var(--navy); }
.btn-popular:hover { background: var(--accent2); transform: translateY(-2px); box-shadow: 0 10px 30px rgba(0,194,212,0.2); }

/* ── COMPARISON TABLE ── */
.comparison-section { padding: 6rem 4rem; max-width: 1000px; margin: 0 auto; }
.comparison-section h2 { text-align: center; margin-bottom: 4rem; font-family: var(--font-display); font-size: 2rem; }
table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.9rem;
}
th, td {
  padding: 1.25rem;
  text-align: left;
  border-bottom: 1px solid var(--border);
}
th { font-family: var(--font-mono); font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; }
.feature-name { color: var(--white); font-weight: 500; }
.check { color: var(--accent); font-weight: 800; text-align: center; }
.dash { color: var(--muted); text-align: center; }

/* ── FAQ ── */
.faq-section { padding: 6rem 4rem; background: var(--navy2); }
.faq-container { max-width: 800px; margin: 0 auto; }
.faq-section h2 { text-align: center; margin-bottom: 4rem; font-family: var(--font-display); font-size: 2rem; }
.faq-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 3rem; }
.faq-item h3 { font-family: var(--font-display); font-size: 1.1rem; margin-bottom: 1rem; color: var(--white); }
.faq-item p { font-size: 0.9rem; color: rgba(240,244,255,0.55); line-height: 1.6; }

/* ── BOTTOM CTA ── */
.bottom-cta {
  padding: 8rem 4rem;
  text-align: center;
  background: linear-gradient(to bottom, var(--navy2), var(--navy));
}
.bottom-cta h2 { font-family: var(--font-display); font-size: 2.5rem; margin-bottom: 1.5rem; }
.bottom-cta p { color: var(--muted); margin-bottom: 3rem; }

/* ── FOOTER ── */
footer {
  border-top: 1px solid var(--border);
  padding: 5rem 4rem 2rem;
  background: var(--navy);
}
.footer-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 4rem;
  margin-bottom: 4rem;
}
.footer-logo {
  font-family: var(--font-display);
  font-size: 1.4rem;
  font-weight: 800;
  color: var(--white);
  text-decoration: none;
  margin-bottom: 1rem;
  display: block;
}
.footer-logo span { color: var(--accent); }
.footer-col h4 {
  font-family: var(--font-mono);
  font-size: 0.72rem;
  color: var(--white);
  letter-spacing: 0.15em;
  text-transform: uppercase;
  margin-bottom: 1.5rem;
}
.footer-col ul { list-style: none; }
.footer-col ul li { margin-bottom: 0.75rem; }
.footer-col ul li a {
  font-size: 0.85rem;
  color: var(--muted);
  text-decoration: none;
  transition: color 0.2s;
}
.footer-col ul li a:hover { color: var(--accent); }
.footer-bottom {
  border-top: 1px solid var(--border);
  padding-top: 2rem;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.footer-copy { font-size: 0.78rem; color: var(--muted); }

/* ── RESPONSIVE ── */
@media (max-width: 1024px) {
  .pricing-grid { grid-template-columns: 1fr; max-width: 500px; }
  .price-card.popular { transform: none; }
  .faq-grid { grid-template-columns: 1fr; }
  .footer-grid { grid-template-columns: 1fr 1fr; }
}
@media (max-width: 768px) {
  nav { padding: 1rem 20px; }
  .hamburger { display: flex; }
  .nav-links {
    position: fixed;
    top: 0; right: -100%;
    width: 100%; height: 100vh;
    background: var(--navy);
    flex-direction: column;
    justify-content: center;
    align-items: center;
    transition: 0.4s;
    z-index: 100;
    gap: 2rem;
  }
  .nav-links.active { right: 0; }
  .nav-right { display: none; }
  
  .pricing-hero, .comparison-section, .faq-section, .bottom-cta, footer { padding: 4rem 20px; }
  .pricing-hero h1 { font-size: 2.5rem; }
  
  .pricing-grid { max-width: 100%; }
  .comparison-section { overflow-x: auto; }
  table { min-width: 600px; }
  
  .footer-grid { grid-template-columns: 1fr; gap: 2rem; }
  .footer-bottom { flex-direction: column; gap: 1rem; text-align: center; }
}
</style>

let mx = 0, my = 0, rx = 0, ry = 0;
document.addEventListener('mousemove', e => {
  mx = e.clientX; my = e.clientY;
  cursor.style.transform = `translate(${mx-5}px, ${my-5}px)`;
});
function animateRing() {
  rx += (mx - rx) * 0.12;
  ry += (my - ry) * 0.12;
  ring.style.transform = `translate(${rx-18}px, ${ry-18}px)`;
  requestAnimationFrame(animateRing);
}
animateRing();
document.querySelectorAll('a, button, label').forEach(el => {
  el.addEventListener('mouseenter', () => {
    cursor.style.transform += ' scale(1.8)';
    ring.style.width = '50px'; ring.style.height = '50px';
    ring.style.borderColor = 'rgba(0,194,212,0.6)';
  });
  el.addEventListener('mouseleave', () => {
    ring.style.width = '36px'; ring.style.height = '36px';
    ring.style.borderColor = 'rgba(0,194,212,0.4)';
  });
});

// Pricing Toggle
const toggle = document.getElementById('pricing-toggle');
const starterPrice = document.getElementById('starter-price');
const profPrice = document.getElementById('prof-price');
const starterPeriod = document.getElementById('starter-period');
const profPeriod = document.getElementById('prof-period');
const labelMonthly = document.getElementById('label-monthly');
const labelAnnual = document.getElementById('label-annual');

toggle.addEventListener('change', () => {
  if (toggle.checked) {
    // Annual
    starterPrice.innerText = '39,999';
    profPrice.innerText = '1,19,999';
    starterPeriod.innerText = '/mo (billed annually)';
    profPeriod.innerText = '/mo (billed annually)';
    labelAnnual.classList.add('active');
    labelMonthly.classList.remove('active');
  } else {
    // Monthly
    starterPrice.innerText = '49,999';
    profPrice.innerText = '1,49,999';
    starterPeriod.innerText = '/mo';
    profPeriod.innerText = '/mo';
    labelMonthly.classList.add('active');
    labelAnnual.classList.remove('active');
  }
});

// Scroll reveal
const reveals = document.querySelectorAll('.reveal');
const observer = new IntersectionObserver(entries => {
  entries.forEach((entry, i) => {
    if (entry.isIntersecting) {
      setTimeout(() => entry.target.classList.add('visible'), i * 80);
    }
  });
}, { threshold: 0.1 });
reveals.forEach(el => observer.observe(el));
</script>
</body>
