<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>404 — Page Not Found | VKatOS</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root {
  --navy: #080F1E;
  --navy2: #0D1829;
  --accent: #00C2D4;
  --accent2: #00E5F5;
  --white: #F0F4FF;
  --muted: #4A5878;
  --border: rgba(255,255,255,0.07);
  --font-display: 'Syne', sans-serif;
  --font-body: 'DM Sans', sans-serif;
  --font-mono: 'DM Mono', monospace;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--navy);
  color: var(--white);
  font-family: var(--font-body);
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  text-align: center;
  overflow: hidden;
  cursor: none;
}

/* ── CUSTOM CURSOR ── */
.cursor {
  width: 10px; height: 10px;
  background: var(--accent);
  border-radius: 50%;
  position: fixed; top: 0; left: 0;
  pointer-events: none;
  z-index: 9999;
  transition: transform 0.15s ease;
}
.cursor-ring {
  width: 36px; height: 36px;
  border: 1px solid rgba(0,194,212,0.4);
  border-radius: 50%;
  position: fixed; top: 0; left: 0;
  pointer-events: none;
  z-index: 9998;
  transition: transform 0.08s ease;
}

.glow-404 {
  font-family: var(--font-display);
  font-size: clamp(8rem, 20vw, 15rem);
  font-weight: 800;
  color: var(--navy);
  -webkit-text-stroke: 1px var(--accent);
  text-shadow: 0 0 30px rgba(0,194,212,0.3);
  line-height: 1;
  margin-bottom: 2rem;
  position: relative;
}
h1 { font-family: var(--font-display); font-size: 2rem; margin-bottom: 1rem; }
p { color: var(--muted); font-size: 1.1rem; margin-bottom: 3rem; }

.links { display: flex; gap: 2rem; justify-content: center; }
.links a {
  font-family: var(--font-mono);
  font-size: 0.8rem;
  color: var(--accent);
  text-decoration: none;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  border: 1px solid var(--border);
  padding: 0.75rem 1.5rem;
  border-radius: 2px;
  transition: all 0.2s;
}
.links a:hover { background: rgba(0,194,212,0.05); border-color: var(--accent); }

/* GRID */
.grid {
  position: absolute; inset: 0;
  background-image:
    linear-gradient(rgba(0,194,212,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,194,212,0.03) 1px, transparent 1px);
  background-size: 60px 60px;
  mask-image: radial-gradient(circle, black 30%, transparent 100%);
  z-index: -1;
}
</style>
</head>
<body>

<div class="cursor" id="cursor"></div>
<div class="cursor-ring" id="cursorRing"></div>
<div class="grid"></div>

<div>
  <div class="glow-404">404</div>
  <h1>This page doesn't exist. Yet.</h1>
  <p>The pipeline you're looking for hasn't been deployed.</p>
  
  <div class="links">
    <a href="/">Back to Home</a>
    <a href="/#products">View Products</a>
    <a href="/contact">Contact Us</a>
  </div>
</div>

<script>
const cursor = document.getElementById('cursor');
const ring = document.getElementById('cursorRing');
let mx = 0, my = 0, rx = 0, ry = 0;
document.addEventListener('mousemove', e => {
  mx = e.clientX; my = e.clientY;
  cursor.style.transform = `translate(${mx-5}px, ${my-5}px)`;
});
function animateRing() {
  rx += (mx - rx) * 0.12;
  ry += (my - ry) * 0.12;
  ring.style.transform = `translate(${rx-18}px, ${ry-18}px)`;
  requestAnimationFrame(animateRing);
}
animateRing();
</script>
</body>
</html>
